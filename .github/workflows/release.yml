name: Release
on:
  push:
    tags: ['v*']
permissions:
  contents: write
jobs:
  release:
    runs-on: windows-2022   # pinned: windows-latest moved to VS 18 (2026), which node-gyp 10 (Node 20) can't find. winax needs VS 2022.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'   # from .nvmrc
      - name: Pin a node-gyp-compatible Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'   # runner default Python 3.14 isn't supported by node-gyp 10
      - name: Activate MSVC dev environment (so node-gyp finds Visual Studio)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
      - name: Install & build
        run: |
          npm ci
          npm run build
      - name: Compile native winax (QuickBooks COM bridge) into the bundle
        shell: pwsh
        run: |
          # The committed package-lock.json omits winax (a Windows-only
          # optionalDependency), so `npm ci` records it as optional-skipped and a
          # plain `npm install winax` then reports "up to date" without compiling.
          # Promote winax to a HARD dependency so node-gyp actually builds it on the
          # runner. --foreground-scripts surfaces the gyp output if the build fails.
          npm pkg delete optionalDependencies.winax
          npm pkg set dependencies.winax="^3.4.2"
          npm install --foreground-scripts
      - name: Drop devDeps (keep prod + optional winax)
        run: npm prune --omit=dev
      - name: GATE - fail the release if the winax native binary is absent
        shell: pwsh
        run: |
          $bin = Get-ChildItem node_modules/winax -Recurse -Filter *.node -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $bin) { throw "winax native .node binary missing - the QuickBooks MCP would be non-functional. Failing the release." }
          Write-Host "winax binary present: $($bin.FullName)"
      - name: Bundle self-contained server
        shell: pwsh
        run: Compress-Archive -Path dist,node_modules,package.json -DestinationPath "quickbooks-mcp-${{ github.ref_name }}.zip" -Force
      - uses: softprops/action-gh-release@v2
        with:
          files: quickbooks-mcp-*.zip
          generate_release_notes: true
